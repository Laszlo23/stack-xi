# HTTP — ACME + redirect
server {
    listen 80;
    listen [::]:80;
    server_name pepe.buildingcultureid.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — STACK XI TanStack Start (Node)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pepe.buildingcultureid.space;

    ssl_certificate /etc/letsencrypt/live/pepe.buildingcultureid.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pepe.buildingcultureid.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://*.warpcast.com https://warpcast.com https://*.farcaster.xyz https://farcaster.xyz https://*.base.org https://base.org https://*.coinbase.com https://coinbase.com https://web.telegram.org https://*.telegram.org;" always;

    location /.well-known/ {
        alias /var/www/pepe-buildingculture/dist/public/.well-known/;
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    location /og/ {
        alias /var/www/pepe-buildingculture/dist/public/og/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        proxy_pass http://127.0.0.1:3014;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
